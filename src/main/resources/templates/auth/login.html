<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Connexion – School Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link th:href="@{/css/school-theme.css}" rel="stylesheet">
  <style>
    body { background: linear-gradient(135deg,#e6f4ea 0%,#f8faf9 60%); min-height:100vh; }
    .login-card { max-width: 420px; width: 100%; }
  </style>
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100">
  <div class="login-card p-3">
    <div class="text-center mb-4">
      <span style="font-size:2.5rem">🎓</span>
      <h1 class="h3 mt-2" style="color:#4b3621">School Management</h1>
      <p class="text-muted small">Système de gestion scolaire</p>
    </div>
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <div th:if="${param.error}" class="alert alert-danger py-2">Identifiants incorrects.</div>
        <div th:if="${param.logout}" class="alert alert-success py-2">Déconnexion réussie.</div>
        <form th:action="@{/login}" method="post">
          <div class="mb-3">
            <label class="form-label fw-semibold">Nom d'utilisateur</label>
            <input class="form-control" name="username" autofocus required placeholder="ex: admin" />
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Mot de passe</label>
            <input class="form-control" type="password" name="password" required placeholder="••••••••" />
          </div>
          <button class="btn btn-primary w-100 py-2">Se connecter</button>
        </form>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
