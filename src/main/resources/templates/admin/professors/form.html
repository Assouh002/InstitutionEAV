<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::section})}">
<section>
  <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
    <h1 class="m-0" th:text="${professor.id} == null ? 'Nouveau professeur' : 'Modifier professeur'">Form</h1>
    <a class="btn btn-outline-primary" th:href="@{/admin/professors}">← Retour</a>
  </div>
  <div class="card">
    <div class="card-body">
      <form th:action="${professor.id} == null ? @{/admin/professors} : @{'/admin/professors/' + ${professor.id}}"
            th:object="${professor}" method="post">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Prénom</label>
            <input class="form-control" th:field="*{firstName}" required />
          </div>
          <div class="col-md-6">
            <label class="form-label">Nom</label>
            <input class="form-control" th:field="*{lastName}" required />
          </div>
          <div class="col-md-8">
            <label class="form-label">Email</label>
            <input class="form-control" th:field="*{email}" type="email" required />
          </div>
        </div>
        <div class="mt-4 d-flex gap-2 flex-wrap">
          <button class="btn btn-primary">💾 Enregistrer</button>
          <a class="btn btn-outline-secondary" th:href="@{/admin/professors}">Annuler</a>
        </div>
      </form>
    </div>
  </div>
</section>
</html>
