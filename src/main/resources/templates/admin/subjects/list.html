<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::section})}">
<section>
  <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
    <h1 class="m-0">📚 Matières</h1>
    <div class="d-flex gap-2 flex-wrap">
      <a class="btn btn-outline-primary" th:href="@{/admin/dashboard}">← Retour</a>
      <a class="btn btn-success" th:href="@{/admin/subjects/new}">+ Nouvelle</a>
    </div>
  </div>

  <div class="table-responsive">
    <table class="table table-striped align-middle">
      <thead>
        <tr>
          <th>Nom</th><th class="text-center">Coef</th><th class="d-none d-md-table-cell">Professeur</th><th class="text-end">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="s : ${subjects}">
          <td th:text="${s.name}">Math</td>
          <td class="text-center"><span class="badge bg-primary" th:text="${s.coefficient}">1</span></td>
          <td class="d-none d-md-table-cell text-muted"
              th:text="${s.professor != null ? (s.professor.firstName + ' ' + s.professor.lastName) : '—'}">—</td>
          <td class="text-end">
            <div class="d-flex gap-1 justify-content-end">
              <a class="btn btn-sm btn-primary" th:href="@{|/admin/subjects/${s.id}/edit|}">Modifier</a>
              <form th:action="@{|/admin/subjects/${s.id}/delete|}" method="post" class="d-inline">
                <button class="btn btn-sm btn-danger" onclick="return confirm('Supprimer cette matière ?')">Supprimer</button>
              </form>
            </div>
          </td>
        </tr>
        <tr th:if="${#lists.isEmpty(subjects)}">
          <td colspan="4" class="text-center text-muted">Aucune matière enregistrée</td>
        </tr>
      </tbody>
    </table>
  </div>
</section>
</html>
