<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::section})}">
<section>
  <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
    <h1 class="m-0" th:text="${subject.id} == null ? 'Nouvelle matière' : 'Modifier matière'">Form</h1>
    <a class="btn btn-outline-primary" th:href="@{/admin/subjects}">← Retour</a>
  </div>
  <div class="card">
    <div class="card-body">
      <form th:action="${subject.id} == null ? @{/admin/subjects} : @{'/admin/subjects/' + ${subject.id}}"
            th:object="${subject}" method="post">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Nom de la matière</label>
            <input class="form-control" th:field="*{name}" required />
          </div>
          <div class="col-md-3">
            <label class="form-label">Coefficient</label>
            <input class="form-control" th:field="*{coefficient}" type="number" min="1" required />
          </div>
          <div class="col-md-7">
            <label class="form-label">Professeur (optionnel)</label>
            <select class="form-select" th:field="*{professor}">
              <option th:value="${null}">-- Aucun --</option>
              <option th:each="p : ${professors}" th:value="${p.id}"
                      th:text="${p.firstName + ' ' + p.lastName}"></option>
            </select>
            <div class="form-text">Créez d'abord des professeurs si la liste est vide.</div>
          </div>
        </div>
        <div class="mt-4 d-flex gap-2 flex-wrap">
          <button class="btn btn-primary">💾 Enregistrer</button>
          <a class="btn btn-outline-secondary" th:href="@{/admin/subjects}">Annuler</a>
        </div>
      </form>
    </div>
  </div>
</section>
</html>
