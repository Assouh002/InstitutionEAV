<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::section})}">
<section>
  <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
    <h1 class="m-0" th:text="${student.id} == null ? 'Nouvel étudiant' : 'Modifier étudiant'">Form</h1>
    <a class="btn btn-outline-primary" th:href="@{/admin/students}">← Retour</a>
  </div>

  <div class="card">
    <div class="card-body">
      <form th:action="${student.id} == null ? @{/admin/students} : @{'/admin/students/' + ${student.id}}"
            th:object="${student}" method="post">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Prénom</label>
            <input class="form-control" th:field="*{firstName}" required />
          </div>
          <div class="col-md-6">
            <label class="form-label">Nom</label>
            <input class="form-control" th:field="*{lastName}" required />
          </div>
          <div class="col-md-6">
            <label class="form-label">Email</label>
            <input class="form-control" th:field="*{email}" type="email" required />
          </div>
          <div class="col-md-4">
            <label class="form-label">Classe</label>
            <input class="form-control" th:field="*{classroom}" placeholder="Ex: L1, L2, Terminale..." required />
          </div>
          <div class="col-md-4">
            <label class="form-label">Code secret bulletin</label>
            <input class="form-control" th:field="*{secretCode}" placeholder="Ex: 1234" />
            <div class="form-text">Ce code permet à l'étudiant d'accéder à son bulletin.</div>
          </div>
        </div>
        <div class="mt-4 d-flex gap-2 flex-wrap">
          <button class="btn btn-primary">💾 Enregistrer</button>
          <a class="btn btn-outline-secondary" th:href="@{/admin/students}">Annuler</a>
        </div>
      </form>
    </div>
  </div>
</section>
</html>
