<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::section})}">
<section>
  <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
    <h1 class="m-0" th:text="${grade.id} == null ? '+ Nouvelle note' : '✏ Modifier note'">Note</h1>
    <a class="btn btn-outline-primary"
       th:href="${studentId} != null ? @{|/admin/students/${studentId}/bulletin|} : @{/admin/grades}">
      ← Retour
    </a>
  </div>

  <div class="card">
    <div class="card-body">
      <form th:action="${grade.id} == null ? @{/admin/grades} : @{'/admin/grades/' + ${grade.id}}"
            th:object="${grade}" method="post">
        <input type="hidden" name="studentId" th:value="${studentId}">

        <div class="row g-3">

          <!-- Étudiant verrouillé : vient d'un bulletin spécifique -->
          <div class="col-md-6" th:if="${selectedStudent != null}">
            <label class="form-label fw-semibold">Étudiant</label>
            <div class="form-control bg-light" style="cursor:default;">
              <span th:text="${selectedStudent.classroom + ' – ' + selectedStudent.firstName + ' ' + selectedStudent.lastName}">—</span>
            </div>
            <input type="hidden" name="student" th:value="${selectedStudent.id}" />
          </div>

          <!-- Étudiant libre : vient de la liste des notes -->
          <div class="col-md-6" th:unless="${selectedStudent != null}">
            <label class="form-label fw-semibold">Étudiant</label>
            <select class="form-select" th:field="*{student}" required>
              <option value="" disabled>-- Choisir un étudiant --</option>
              <option th:each="s : ${students}"
                      th:value="${s.id}"
                      th:text="${s.classroom + ' – ' + s.firstName + ' ' + s.lastName}"
                      th:selected="${grade.student != null and grade.student.id == s.id}">
              </option>
            </select>
          </div>

          <!-- Matière -->
          <div class="col-md-6">
            <label class="form-label fw-semibold">Matière</label>
            <select class="form-select" th:field="*{subject}" required>
              <option value="" disabled>-- Choisir une matière --</option>
              <option th:each="m : ${subjects}"
                      th:value="${m.id}"
                      th:text="${m.name + ' (coef ' + m.coefficient + ')'}"
                      th:selected="${grade.subject != null and grade.subject.id == m.id}">
              </option>
            </select>
          </div>

          <!-- Note -->
          <div class="col-md-3">
            <label class="form-label fw-semibold">Note <span class="text-muted">(0 – 20)</span></label>
            <input class="form-control" th:field="*{value}"
                   type="number" step="0.01" min="0" max="20" required />
          </div>

        </div>

        <div class="mt-4 d-flex gap-2 flex-wrap">
          <button class="btn btn-primary">💾 Enregistrer</button>
          <a class="btn btn-outline-secondary"
             th:href="${studentId} != null ? @{|/admin/students/${studentId}/bulletin|} : @{/admin/grades}">
            Annuler
          </a>
        </div>

      </form>
    </div>
  </div>
</section>
</html>
