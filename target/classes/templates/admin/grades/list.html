<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::section})}">
<section>
  <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
    <h1 class="m-0">📝 Notes</h1>
    <div class="d-flex gap-2 flex-wrap">
      <a class="btn btn-outline-primary" th:href="@{/admin/dashboard}">← Retour</a>
      <a class="btn btn-success" th:href="@{/admin/grades/new}">+ Nouvelle note</a>
    </div>
  </div>

  <div class="alert alert-secondary small">
    Conseil : créez d'abord des <b>Étudiants</b> et des <b>Matières</b> avant d'ajouter des notes.
  </div>

  <div class="table-responsive">
    <table class="table table-striped align-middle">
      <thead>
        <tr><th>Étudiant</th><th>Classe</th><th>Matière</th><th class="text-center">Note</th><th class="text-end">Actions</th></tr>
      </thead>
      <tbody>
        <tr th:each="g : ${grades}">
          <td th:text="${g.student.firstName + ' ' + g.student.lastName}">...</td>
          <td><span class="badge bg-secondary" th:text="${g.student.classroom}">L1</span></td>
          <td th:text="${g.subject.name}">...</td>
          <td class="text-center fw-bold"
              th:text="${#numbers.formatDecimal(g.value,1,2)}"
              th:class="${g.value >= 10 ? 'text-center fw-bold text-success' : 'text-center fw-bold text-danger'}">10</td>
          <td class="text-end">
            <div class="d-flex gap-1 justify-content-end">
              <a class="btn btn-sm btn-primary" th:href="@{|/admin/grades/${g.id}/edit|}">Modifier</a>
              <form th:action="@{|/admin/grades/${g.id}/delete|}" method="post" class="d-inline">
                <button class="btn btn-sm btn-danger" onclick="return confirm('Supprimer cette note ?')">Supprimer</button>
              </form>
            </div>
          </td>
        </tr>
        <tr th:if="${#lists.isEmpty(grades)}">
          <td colspan="5" class="text-center text-muted">Aucune note enregistrée</td>
        </tr>
      </tbody>
    </table>
  </div>
</section>
</html>
