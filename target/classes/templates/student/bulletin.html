<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::section})}">
<section>

  <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
    <h1 class="m-0">📋 Mon Bulletin</h1>
    <div class="d-flex gap-2 flex-wrap">
      <a class="btn btn-outline-primary" th:href="${backUrl} ?: @{/student/dashboard}">← Retour</a>
      <a class="btn btn-outline-primary" th:href="${pdfUrl}" target="_blank">📄 PDF</a>
    </div>
  </div>

  <div class="card mb-3">
    <div class="card-body">
      <h5 class="card-title" th:text="${student.firstName + ' ' + student.lastName}">Nom</h5>
      <p class="mb-1"><b>Email :</b> <span th:text="${student.email}">x</span></p>
      <p class="mb-0"><b>Classe :</b> <span class="badge bg-secondary" th:text="${student.classroom}">L1</span></p>
    </div>
  </div>

  <div class="table-responsive">
    <table class="table table-bordered align-middle">
      <thead class="table-light">
        <tr><th>Matière</th><th class="text-center">Coef</th><th class="text-center">Note /20</th></tr>
      </thead>
      <tbody>
        <tr th:each="g : ${grades}">
          <td th:text="${g.subject.name}">Math</td>
          <td class="text-center" th:text="${g.subject.coefficient}">1</td>
          <td class="text-center fw-bold"
              th:text="${#numbers.formatDecimal(g.value,1,2)}"
              th:class="${g.value >= 10 ? 'text-center fw-bold text-success' : 'text-center fw-bold text-danger'}">10</td>
        </tr>
        <tr th:if="${#lists.isEmpty(grades)}">
          <td colspan="3" class="text-center text-muted fst-italic">Aucune note enregistrée</td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="alert" th:classappend="${weightedAverage >= 10 ? 'alert-success' : 'alert-warning'}">
    <strong>Moyenne pondérée :</strong>
    <span class="fs-5 fw-bold" th:text="${#numbers.formatDecimal(weightedAverage, 1, 2)}">0.00</span> / 20
    <span th:if="${weightedAverage >= 10}" class="ms-2 badge bg-success">✓ Admis(e)</span>
    <span th:unless="${weightedAverage >= 10 or #lists.isEmpty(grades)}" class="ms-2 badge bg-warning text-dark">⚠ En dessous de la moyenne</span>
  </div>

</section>
</html>
