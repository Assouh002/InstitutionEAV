<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::section})}">
<section>

  <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
    <h1 class="m-0">👨‍🏫 Espace Professeur</h1>
  </div>

  <div class="card mb-3">
    <div class="card-body">
      <h5 class="card-title" th:text="${professor.firstName + ' ' + professor.lastName}">Professeur</h5>
      <p class="text-muted mb-0" th:text="${professor.email}">email</p>
    </div>
  </div>

  <h2 class="h5 mb-3">📚 Matières attribuées</h2>

  <div class="table-responsive">
    <table class="table table-striped align-middle">
      <thead>
        <tr><th>Matière</th><th class="text-center">Coefficient</th></tr>
      </thead>
      <tbody>
        <tr th:each="s : ${subjects}">
          <td th:text="${s.name}">Math</td>
          <td class="text-center"><span class="badge bg-primary" th:text="${s.coefficient}">2</span></td>
        </tr>
        <tr th:if="${#lists.isEmpty(subjects)}">
          <td colspan="2" class="text-center text-muted fst-italic">Aucune matière assignée</td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="alert alert-info small mt-3">
    ℹ️ La saisie des notes s'effectue via l'administrateur.
  </div>

</section>
</html>
